name: Build APK Android

# Se declenche a chaque envoi (push) sur la branche main,
# ou manuellement depuis l'onglet "Actions" de GitHub
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code du depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances systeme necessaires a Buildozer
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool libltdl-dev pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev build-essential ccache gettext

      - name: Installer Buildozer et Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Compiler l'APK (mode debug)
        working-directory: ./android
        run: |
          yes | buildozer android debug

      - name: Mettre l'APK a disposition au telechargement
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-apk
          path: android/bin/*.apk
